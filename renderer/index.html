        }

        @font-face {

        @font-face {
            font-family: "Anton";
            font-style: normal;

        }

        .brand-tagline {
            font-size: 11px;
            letter-spacing: 2px;
            font-family: "Geist", sans-serif;

            color: rgba(255, 255, 255, 0.5);
            /* margin-top: 6px; */
        }

        .brand-logo-accent {
            color: rgb(225, 24, 85);
        }

        /* .brand-tagline {
            font-size: 11px;

        .brain-ring-wrap {
            /* position: relative;
            width: 180px;
            height: 180px;
            margin: 20px auto 16px;
            border: 4px solid #fff;
            border-radius: 50%;
            box-shadow: 0 0 16px #cdc7c717, inset 0 0 18px #ffffff24; */
             position: relative;

  border: 4px solid rgba(255, 255, 255, 0.05); /* ← nearly invisible */
  border-radius: 50%;

        }

        .brain-ring-svg {
            position: absolute;
            inset: -2px;
            width: calc(100% + 4px);
            height: calc(100% + 4px);
            pointer-events: none;
        }

        .brain-ring-track {
            /* fill: none;
            stroke: transparent;
            stroke-width: 6; */
             fill: none;
  stroke: rgba(255, 255, 255, 0.06); /* ← almost invisible background */

        }

        .brain-ring-progress {
            /* fill: none;
            stroke: #ffffff;
            stroke-width: 6;
            stroke-linecap: round;
            stroke-dasharray: 540.354;
            stroke-dashoffset: 540.354;
            transform: rotate(-90deg);
            transform-origin: center;
            transition:
                stroke-dasharray 0.4s ease,
                stroke-dashoffset 0.4s ease; */
            /* filter: drop-shadow(0 0 6px rgba(243, 242, 242, 0.7)); */
            fill: none;

  stroke-width: 6;
  stroke-linecap: round;
  stroke-dasharray: 540.354;
  stroke-dashoffset: 540.354;
  transform: rotate(-90deg);
  transform-origin: center;

        }

        .brain-infinity {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2px;
        }

        .infinity-svg {
            width: 166px;
            height: 106px;
            filter: drop-shadow(0 0 2px #E11855);
        }

        .infinity-loop {
            fill: none;
            stroke: #E11855;
            stroke-width: 7;
            opacity: .85;
        }

        @keyframes infinityPulse {

            0%,
            100% {
                opacity: .7;
            }

            50% {
                opacity: 1;
            }
        }

        .brain-infinity.active .infinity-loop {
            animation: infinityPulse 1.4s ease-in-out infinite;
        }

        .brain-percent {
            font-size: 20px;
            font-weight: 400;
            color: #fff;
            font-family: "GeistMono", monospace;

        }

        .brain-loading-label {
            text-align: center;
            font-size: 12px;
            color: rgba(255, 255, 255, .65);
            margin-top: 2px;
        }

        .brain-loading-label .file-name {
            color: #fff;
            font-weight: 600;
        }

        .brief-card {
            margin-top: 35px;

            height: auto;
            padding: 14px 12px;
            border-radius: 14px;
            background: rgb(203 201 201 / 44%);
            border: 1px solid rgba(255, 255, 255, .08);
            text-align: center;
        }

        .brief-title {
            font-family: "Geist", sans-serif;
            font-size: 18px;
            font-weight: 500;
            color: #ffffff;
            margin-bottom: 10px;
        }

        .brief-mic-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            margin: 0 auto 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: #fff;
            background: linear-gradient(135deg, rgb(225, 24, 85), #7C3AED);
            box-shadow: 0 4px 16px rgba(255, 42, 133, .45);
            transition: transform .15s ease;
        }

        .brief-mic-btn:active {
            transform: scale(.93);
        }

        .brief-mic-btn.recording {
            animation: micPulse 1s ease-in-out infinite;
        }

        .brief-mic-btn img {
            width: 25px;
            height: 25px;
            filter: invert(1);
            pointer-events: none;
        }

        @keyframes micPulse {

            0%,
            100% {
                box-shadow: 0 4px 16px rgba(255, 42, 133, .45);
            }

            50% {
                box-shadow: 0 4px 26px rgba(255, 42, 133, .8);
            }
        }

        .brief-input {
            width: 100%;
            background: rgb(41 37 37 / 49%);
            border: 1px solid rgba(255, 255, 255, .12);
            border-radius: 10px;
            padding: 9px 10px;
            color: #ffffff;
            font-size: 14px;
            outline: none;
            text-align: center;
            margin-bottom: 10px;

        }

        .brief-input::placeholder {
            color: rgba(255, 255, 255, .4);
        }

        /*
         * FIX: keep the legacy session-status block in the DOM (just visually
         * hidden) instead of commenting it out. app.js's startSession() reads
         * #status-icon / #status-title / #status-sub directly — if those IDs
         * don't exist, getElementById() returns null and the very next line
         * (null.textContent = ...) throws, which silently kills the rest of
         * startSession() and makes "Start Listening" look like it does nothing.
         */
        .session-status--legacy {
            display: none;
        }


        .brief-mic-btn.listening {
            background: rgb(225, 24, 85);
            box-shadow: 0 0 20px rgb(225, 24, 85);
            animation: micPulse 1s ease-in-out infinite;
        }
    </style>
</head>

<body>
    <div id="app">

        <!-- MAC BLACKHOLE BANNER -->
        <div id="mac-banner">
            <div class="banner-text">
                🎙 Mac detected — install audio driver to hear all participants
            </div>
            <button class="banner-btn" id="bh-install-btn">Install</button>
            <button class="banner-dismiss" id="bh-dismiss-btn">×</button>
        </div>

        <!-- TITLEBAR -->
        <div id="titlebar">
            <div class="title-left">
                <div class="holo-logo">
                    <img src="../assets/holo-logo.png" data-fallback-src="../../assets/holo-logo.png" alt="Holo logo"
                        onerror="if(!this.dataset.fallbackTried){this.dataset.fallbackTried='1';this.src=this.dataset.fallbackSrc;}else{this.style.display='none';this.nextElementSibling.style.display='flex';}" />
                    <span class="logo-fallback">H</span>
                </div>
                <span class="title-text">Holo Assist</span>
                <div class="live-dot" id="live-dot"></div>
            </div>
            <div class="title-controls">
                <button class="ctrl-btn btn-min" onclick="window.holoAPI.minimizeOverlay()">−</button>
                <button class="ctrl-btn btn-close" onclick="window.holoAPI.closeOverlay()">×</button>
            </div>
        </div>

        <!-- TABS -->
        <div id="tabs">
            <button class="tab active" data-tab="session">Brain</button>
            <button class="tab" data-tab="insights">
                Session <span class="tab-badge" id="insight-badge" style="display:none">0</span>
            </button>
            <button class="tab" data-tab="chat">Chat</button>
        </div>

        <!-- CONTENT AREA -->
        <div id="content">

            <!-- ── SESSION TAB ─────────────────────────────────────────── -->
            <div class="tab-panel active" id="panel-session">

                <div class="brand-header">
                    <div class="brand-logo">HOLO<span class="brand-logo-accent">VOX</span></div>
                    <div class="brand-tagline">See me. Feel me. Holo me.</div>
                </div>

                <div class="brain-ring-wrap">
                    <svg class="brain-ring-svg" viewBox="0 0 180 180">
                        <circle class="brain-ring-track" cx="90" cy="90" r="86"></circle>
                        <circle class="brain-ring-progress" id="brain-ring-progress" cx="90" cy="90" r="86"></circle>
                    </svg>
                    <div class="brain-infinity" id="brain-infinity">
                        <svg class="infinity-svg" viewBox="0 0 100 60">
                            <circle class="infinity-loop" cx="36" cy="30" r="20"></circle>
                            <circle class="infinity-loop" cx="64" cy="30" r="20"></circle>
                        </svg>
                        <div class="brain-percent" id="brain-percent">0:00</div>
                    </div>
                </div>

                <div class="brain-loading-label" id="brain-loading-label" style="display:none">
                    Brain loading… <span class="file-name" id="brain-loading-file"></span>
                </div>

                <!--
                    FIX: this block is no longer commented out. It is kept in the
                    DOM (with class "session-status--legacy" hiding it visually)
                    so #status-icon / #status-title / #status-sub still exist for
                    app.js to update safely. Previously this whole block was an
                    HTML comment, which removed those elements from the DOM
                    entirely and caused startSession() to throw on a null
                    reference, breaking the Start Listening button.
                -->
                <div class="session-status session-status--legacy">
                    <div class="status-icon" id="status-icon">🎙️</div>
                    <div class="status-title" id="status-title">Ready to listen</div>
                    <div class="status-sub" id="status-sub">Select your meeting audio below</div>
                </div>

                <div class="brief-card" id="brief-card">
                    <div class="brief-title">Brief the Brain</div>

                    <button class="brief-mic-btn" id="brief-mic-btn" onclick="toggleListening()"
                        aria-label="Start listening">
                        <img src="../assets/microphone-solid-full.svg" alt="" />
                    </button>
                    <!-- <input class="brief-input" id="brief-input" placeholder="Speak or type your pre-meeting brief" /> -->

                    <div class="source-wrap" id="source-wrap">
                        <div class="source-label">Audio Source</div>
                        <select id="source-select">
                            <option value="mic">🎤 Microphone only</option>
                        </select>
                    </div>
                </div>

                <!-- <div class="source-wrap" id="source-wrap">
                    <div class="source-label">Audio Source</div>
                    <select id="source-select">
                        <option value="mic">🎤 Microphone only</option>
                    </select>
                </div> -->

                <!-- <button class="btn-primary" id="start-btn" onclick="startSession()">
                    ▶ Start Listening
                </button> -->

                <div class="stats-row" id="stats-row" style="display:none">
                    <!-- <div class="stat-card">
                        <div class="stat-value" id="stat-insights">0</div>
                        <div class="stat-label">Insights</div>
                    </div> -->
                    <div class="stat-card">
                        <div class="stat-value" id="stat-duration">0:00</div>
                        <div class="stat-label">Duration</div>
                    </div>
                    <!-- <div class="stat-card">
                        <div class="stat-value" id="stat-words">0</div>
                        <div class="stat-label">Words</div>
                    </div> -->
                </div>

            </div>

            <!-- ── INSIGHTS TAB ───────────────────────────────────────── -->
            <div class="tab-panel" id="panel-insights">
                <div class="empty-state" id="insights-empty">
                    <div class="brain-infinity insights-brain-loader" id="insights-brain-loader">
                        <svg class="insights-loader-ring" viewBox="0 0 180 180" aria-hidden="true">
                            <circle class="insights-loader-track" cx="90" cy="90" r="86"></circle>
                            <circle class="insights-loader-progress" cx="90" cy="90" r="86"></circle>
                        </svg>
                        <svg class="infinity-svg" viewBox="0 0 100 60">
                            <circle class="infinity-loop" cx="36" cy="30" r="20"></circle>
                            <circle class="infinity-loop" cx="64" cy="30" r="20"></circle>
                        </svg>
                    </div>
                </div>
                <div id="insights-list">
                    <div class="insight-card insight-card--dummy" id="card-dummy">
                        <button class="insight-card-action insight-card-close" title="Dismiss insight"
                            aria-label="Dismiss insight" onclick="dismissCard('dummy',event)">
                            <img src="../assets/close-svgrepo-com.svg" alt="" />
                        </button>
                        <button class="insight-card-action insight-card-copy" title="Copy insight"
                            aria-label="Copy insight">
                            <img src="../assets/copy-svgrepo-com.svg" alt="" />
                        </button>
                        <div class="insight-text">That concern is valid - validate first, then reframe to the numbers.
                        </div>
                    </div>
                </div>
            </div>

            <!-- ── CHAT TAB ───────────────────────────────────────────── -->
            <div class="tab-panel" id="panel-chat">
                <div id="chat-messages"></div>
                <div id="chat-input-area">
                    <input id="chat-input" placeholder="Ask Holo anything…" onkeydown="handleChatKey(event)"
                        autocomplete="off" />
                    <button class="send-btn" onclick="sendChat()">➤</button>
                </div>
            </div>

        </div><!-- /content -->

        <!-- INSIGHT MODAL -->
        <div id="insight-modal">
            <div class="modal-card">
                <div class="modal-type" id="modal-type"></div>
                <div class="modal-text" id="modal-text"></div>
            </div>
            <div class="modal-actions">
                <button class="modal-btn modal-btn-secondary" onclick="closeModal(false)">✕ Dismiss</button>
                <button class="modal-btn modal-btn-primary" onclick="closeModal(true)">💬 Send to Chat</button>
            </div>
        </div>

        <!-- TOAST -->
        <div id="toast"></div>

    </div><!-- /app -->
    <script src="app.js"></script>
    <script>
        // ── Brain ring / Brief the Brain (demo wiring — replace with real API) ──
        const BRAIN_RING_CIRC = 2 * Math.PI * 86; // ≈ 540.35

        function setBrainProgress(percent) {
            const clamped = Math.max(0, Math.min(100, percent));
            document.getElementById('brain-ring-progress').style.strokeDashoffset =
                BRAIN_RING_CIRC * (1 - clamped / 100);
            document.getElementById('brain-percent').textContent = `${Math.round(clamped)}%`;
        }

        function startBrainLoading(briefText) {
            const label = briefText
                ? (briefText.length > 28 ? briefText.slice(0, 26) + '…' : briefText)
                : 'your brief';

            document.getElementById('brain-infinity').classList.add('active');
            document.getElementById('brain-loading-label').style.display = 'block';
            document.getElementById('brain-loading-file').textContent = label;

            // FIX: these elements are now real (hidden) DOM nodes again, so this
            // no longer throws "Cannot set properties of null".
            const statusTitle = document.getElementById('status-title');
            const statusSub = document.getElementById('status-sub');
            if (statusTitle) statusTitle.textContent = 'Brain loading…';
            if (statusSub) statusSub.textContent = 'Holo is studying your brief';

            let pct = 0;
            setBrainProgress(pct);
            const interval = setInterval(() => {
                pct += Math.random() * 12 + 4;
                if (pct >= 100) {
                    pct = 100;
                    clearInterval(interval);
                    setBrainProgress(100);
                    setTimeout(() => {
                        document.getElementById('brain-infinity').classList.remove('active');
                        document.getElementById('brain-loading-label').style.display = 'none';
                        if (statusTitle) statusTitle.textContent = 'Ready to listen';
                        if (statusSub) statusSub.textContent = 'Select your meeting audio below';
                    }, 600);
                    return;
                }
                setBrainProgress(pct);
            }, 350);
        }
